<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Game 🎮</title>
<style>
  body {
    text-align: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    overflow: hidden;
  }
  h1 { color: white; }

  #gameArea {
    position: relative;
    width: 100%;
    height: 70vh;
  }

  #gift {
  position: absolute;
  font-size: 100px;     
  width: 100px;        
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

  #score {
    font-size: 20px;
    color: white;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>🎂 Catch the Gift! 🎁</h1>
<p id="score">Score: 0</p>
<button onclick="startGame()">Start Game</button>

<div id="gameArea">
  <div id="gift">🎁</div>
</div>

<script>
let score = 0;
let gameInterval;

function startGame() {
  score = 0;
  document.getElementById("score").innerText = "Score: 0";
  moveGift();
  gameInterval = setInterval(moveGift, 800);
}

function moveGift() {
  const gift = document.getElementById("gift");
  const gameArea = document.getElementById("gameArea");

  const maxX = gameArea.clientWidth - 50;
  const maxY = gameArea.clientHeight - 50;

  const randomX = Math.random() * maxX;
  const randomY = Math.random() * maxY;

  gift.style.left = randomX + "px";
  gift.style.top = randomY + "px";
}

document.getElementById("gift").addEventListener("click", function() {
  score++;
  document.getElementById("score").innerText = "Score: " + score;

  if (score >= 10) {
    clearInterval(gameInterval);
    alert("🎉 Happy Birthday To Benz! ขอให้มีความสุขมากๆ สุขภาพร่างกายแข็งแรง ขอให้ปีนี้สวยขึ้นจนเพื่อนหมั่นไส้ ขอให้เหนื่อยน้อยลง ยิ้มมากขึ้น และเงินเพิ่มขึ้น 🎂");
  }
});
</script>

</body>
</html>
